services:

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nestdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: nest_api
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - .env.docker
    command: npm run start:prod

volumes:
  postgres_data: